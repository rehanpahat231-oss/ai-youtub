name: AI YouTube Agent

on:
  schedule:
    - cron: '0 10,14,18,22 * * *'  # 4 times daily (10AM, 2PM, 6PM, 10PM)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai-upload:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install imageio imageio-ffmpeg pillow numpy requests
          pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client
          
      - name: Run AI Agent
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          DEEPSEEK_API: ${{ secrets.DEEPSEEK_API }}  # Optional (free tier available)
        run: python agent.py
        
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-proof-${{ github.run_number }}
          path: |
            outputs/
            logs/
